version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
customHeaders:
  - pattern: '**/*'
    headers:
      - key: Content-Security-Policy
        value: "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://formspree.io https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://formspree.io"
      - key: X-Frame-Options
        value: DENY
      - key: X-Content-Type-Options
        value: nosniff
      - key: Referrer-Policy
        value: strict-origin-when-cross-origin
      - key: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=()"
      - key: Strict-Transport-Security
        value: "max-age=63072000; includeSubDomains; preload"
      - key: X-XSS-Protection
        value: "1; mode=block"
      - key: X-DNS-Prefetch-Control
        value: "on"
  - pattern: '**/*.{js,css,png,jpg,jpeg,gif,svg,webp,avif,woff,woff2,ttf}'
    headers:
      - key: Cache-Control
        value: "public, max-age=31536000, immutable"
redirects:
  - source: '</^[^.]+$|\\.(?!(css|gif|ico|jpg|jpeg|js|png|txt|svg|woff|woff2|ttf)$)([^.]+$)/>'
    target: /index.html
    status: 200
  - source: '/<*>'
    target: /index.html
    status: 200

